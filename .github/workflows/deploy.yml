name: Deploy to Prod VPS

on:
  push:
    branches: [ main ] # Akan trigger otomatis saat ada push ke branch main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Eksekusi SSH dan Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # 1. Pindah ke folder project kamu di VPS
            cd ~/backend-tolongin # GANTI dengan nama folder aslimu di VPS
            
            # 2. Load NVM agar pnpm dan pm2 dikenali oleh GitHub Actions
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            
            # 3. Ambil pembaruan kode terbaru dari GitHub
            git pull origin main
            
            # 4. Install dependencies menggunakan pnpm
            pnpm install --frozen-lockfile
            
            # 5. Restart aplikasi menggunakan PM2
            pm2 restart tolongin # GANTI dengan nama aplikasimu di pm2 list