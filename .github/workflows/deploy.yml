name: Deploy to Dual Prod VPS

on:
  push:
    branches: [ main ] # Akan trigger otomatis saat ada push ke branch main

jobs:
  deploy-vps1:
    name: Deploy ke VPS 1 (Utama Laptop)
    runs-on: ubuntu-latest
    steps:

      # --- LANGKAH BARU: Sambungkan GitHub runner ke Tailscale ---
      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
      # -----------------------------------------------------------
        
      - name: Eksekusi SSH dan Deploy VPS 1
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS2_IP }}
          username: ${{ secrets.VPS2_USER }}
          key: ${{ secrets.VPS2_SSH_KEY }}
          script: |
            # 1. Pindah ke folder project di VPS 1
            cd ~/homelab/projects/backend-tolongin
            
            # 2. Load NVM agar Node, pnpm, dan PM2 otomatis dikenali
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            
            # 3. Paksa Git untuk membuang perubahan lokal dan ambil kode terbaru
            git fetch --all
            git reset --hard origin/main
            git pull origin main
            
            # 4. Install dependencies
            pnpm install --frozen-lockfile

            # 5. Generate ulang Prisma Client (WAJIB jika ada perubahan schema)
            pnpm exec prisma generate
            
            # 6. Jalankan pnpm run build untuk membangun aplikasi
            pnpm run build
            
            # 7. Restart aplikasi menggunakan PM2 Ecosystem Config
            pm2 reload ecosystem.config.js --env production --update-env || pm2 start ecosystem.config.js --env production

  deploy-vps2:
    name: Deploy ke VPS 2 (Cadangan Sumapod)
    runs-on: ubuntu-latest
    steps:
      - name: Eksekusi SSH dan Deploy VPS 2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # 1. Pindah ke folder project di VPS 2
            cd ~/backend-tolongin
            
            # 2. Load NVM agar Node, pnpm, dan PM2 otomatis dikenali
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            
            # 3. Paksa Git untuk membuang perubahan lokal dan ambil kode terbaru
            git fetch --all
            git reset --hard origin/main
            git pull origin main
            
            # 4. Install dependencies menggunakan pnpm
            pnpm install --frozen-lockfile

            # 5. Generate ulang Prisma Client (WAJIB)
            pnpm exec prisma generate
            
            # 6. Jalankan pnpm run build untuk membangun aplikasi
            pnpm run build
            
            # 7. Restart aplikasi menggunakan PM2 Ecosystem Config
            pm2 reload ecosystem.config.js --env production --update-env || pm2 start ecosystem.config.js --env production