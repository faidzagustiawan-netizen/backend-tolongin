name: Deploy to Prod VPS

on:
  push:
    branches: [ main ] # Akan trigger otomatis saat ada push ke branch main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Eksekusi SSH dan Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # 1. Pindah ke folder project kamu di VPS
            cd ~/backend-tolongin
            
            # 2. Load NVM agar Node dan pnpm dikenali
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            
            # 3. Daftarkan jalur global pnpm agar PM2 dikenali
            export PNPM_HOME="$HOME/.local/share/pnpm"
            export PATH="$PNPM_HOME:$PATH"
            
            # 4. Ambil pembaruan kode terbaru dari GitHub
            git pull origin main
            
            # 5. Install dependencies menggunakan pnpm
            pnpm install --frozen-lockfile
            
            # 6. Restart aplikasi menggunakan PM2
            pm2 restart tolongin